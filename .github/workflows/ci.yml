name: CI

# Runs the baseline quality gates on every push to main and every pull
# request. Keeps the branch green between releases — publish.yml runs
# the same checks pre-publish as a belt-and-braces guard, but the gate
# that catches problems early is this workflow.
#
# Matrix expansion (PostgreSQL x Python x Django) is scheduled for 0.5
# per ROADMAP.md; for now Python 3.11 covers the typing floor and 3.13
# covers the runtime tests.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: ty (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: latest
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      # typecheck + django are the only extras the ty gate needs —
      # SQLAlchemy and observability are excluded from ty.toml's src
      # roots. Keeping the install minimal makes the job quick and
      # surfaces accidental dependency creep into the typed surface.
      - name: Install typecheck dependencies
        run: uv sync --python 3.11 --extra typecheck --extra django

      # --output-format github emits GitHub Actions annotation lines so
      # failures show up inline in the PR diff, not buried in the job log.
      - name: Run ty
        run: uv run ty check --output-format github

  test:
    name: Unit tests (Python 3.13)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: latest
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install all extras
        run: |
          uv sync \
            --extra django \
            --extra sqlalchemy \
            --extra observability \
            --extra test

      # Coverage floor lives in .coveragerc (fail_under=80). Raise as
      # gaps close per ROADMAP 0.4 — the gate fails the job if we drop
      # below the floor, which is what we want between releases.
      - name: Run unit tests with coverage
        run: uv run pytest tests/ -q --no-header --cov --cov-report=term

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: latest
          enable-cache: true

      # Pinning the ruff minor keeps formatter output reproducible across
      # contributor machines without wiring ruff into pyproject.toml's
      # dependency graph.
      - name: Ruff check
        run: uvx ruff@0.15 check .
