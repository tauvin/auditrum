[pytest]
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default test discovery roots. Benchmarks live in a sibling tree and
# need ``--benchmark-only`` + the ``benchmark`` extras — running them
# as part of the standard ``pytest`` invocation pulls in missing
# fixtures (pytest-benchmark) and slow container setup.
testpaths = tests
# Keep hypothesis' default ignores (.hypothesis, .tox, etc.) while
# adding our own — prepending ``*`` to replicate the default set.
norecursedirs = * benchmarks .venv build dist
