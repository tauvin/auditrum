site_name: auditrum
site_description: PostgreSQL audit library for Python — framework-agnostic core, Django-first integration, time travel, hash-chain tamper evidence.
site_url: https://tauvin.github.io/auditrum/
repo_url: https://github.com/tauvin/auditrum
repo_name: tauvin/auditrum
edit_uri: edit/main/docs/

# Keep the tree matching the files in ``docs/`` — the guides are
# handwritten prose, and ``reference/`` below gets autogenerated from
# module docstrings via mkdocstrings. New guides go here explicitly
# so the nav is a source of truth instead of an accidental directory
# listing.
nav:
  - Home: README.md
  - Getting started: getting-started.md
  - Guides:
      - Core concepts: concepts.md
      - Django integration: django.md
      - SQLAlchemy integration: sqlalchemy.md
      - Time travel: time-travel.md
      - Hardening: hardening.md
      - Observability: observability.md
      - blame CLI: blame.md
      - CLI reference: cli.md
  - Reference:
      - Architecture: architecture.md
      - API stability: api-stability.md
      - Performance: performance.md
      - Performance tuning: performance-tuning.md
      - Migration cookbook: migration-cookbook.md
  - Case studies:
      - Catalog: case-studies/catalog.md
  - Contributing: ../CONTRIBUTING.md
  - Security: ../SECURITY.md
  - Changelog: ../CHANGELOG.md
  - Roadmap: ../ROADMAP.md

theme:
  name: material
  # Auto-switch based on the reader's OS theme. Falls back to the
  # ``default`` palette; ``slate`` for dark mode.
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - search.highlight
    - search.suggest

plugins:
  - search
  - mkdocstrings:
      # Autogenerate API reference from docstrings. The public surface
      # is defined in ``docs/api-stability.md``; mkdocstrings renders
      # the docstring of each listed symbol so guides can deep-link
      # into the reference without duplicating prose.
      handlers:
        python:
          options:
            show_root_heading: true
            show_source: true
            docstring_style: google
            docstring_section_style: table
            members_order: source
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tauvin/auditrum
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/auditrum/

# Strict mode is off while migrating from plain-markdown ``docs/`` to
# an mkdocs build. Turn on once every broken link is cleaned up —
# ``mkdocs build --strict`` should be part of CI by 0.7 RC.
strict: false
